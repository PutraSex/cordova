name: Build React Native APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project React Native"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan lint (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip
          echo ""
          echo "=== File Type ==="
          file project.zip
          echo ""
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi
          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Menentukan Project Dir ==="
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)

          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "package.json" ]; then
            npm install
          else
            echo "❌ package.json tidak ditemukan!"
            exit 1
          fi

      - name: Lint Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"lint"' package.json; then
              npm run lint > lint_report.txt 2>&1 || true
              echo "[RESULT_LINT]"
              cat lint_report.txt
              echo "[END_RESULT_LINT]"
              rm -f lint_report.txt
            else
              echo "[RESULT_LINT]"
              echo "⚠️ Script lint tidak ditemukan di package.json"
              echo "[END_RESULT_LINT]"
            fi
          else
            echo "[RESULT_LINT]"
            echo "❌ package.json tidak ditemukan."
            echo "[END_RESULT_LINT]"
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: exit 1

      - name: Build Android APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "android/gradlew" ]; then
            echo "✅ Project React Native terdeteksi"
            cd android
            chmod +x gradlew
            
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
          else
            echo "❌ Folder android/gradlew tidak ditemukan!"
            exit 1
          fi

      - name: Build Android AAB (Release only)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "android/gradlew" ]; then
            cd android
            chmod +x gradlew
            ./gradlew bundleRelease
          fi

      - name: Check APK Output
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -n "$APK_FOUND" ]; then
            APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
            echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
            echo "✅ APK ditemukan: $APK_PATH"
          else
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi

      - name: Check AAB Output (Release only)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          AAB_FOUND=$(find $GITHUB_WORKSPACE -name "*.aab" | head -n 1)
          if [ -n "$AAB_FOUND" ]; then
            AAB_PATH=$(echo "$AAB_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
            echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
            echo "✅ AAB ditemukan: $AAB_PATH"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error

      - name: Upload AAB artifact (Release only)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: react-native-aab-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.AAB_PATH }}
          retention-days: 1
          if-no-files-found: warn