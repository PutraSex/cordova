name: Build Cordova APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Cordova"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip
          echo ""
          echo "=== File Type ==="
          file project.zip
          echo ""
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi
          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Menentukan Project Dir ==="
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)

          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Cordova
        run: |
          npm install -g cordova

      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "config.xml" ]; then
            echo "[RESULT_ANALYZE]"
            echo "✅ config.xml ditemukan"
            echo "📋 Project Info:"
            cordova info > analyze_report.txt 2>&1 || true
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"
            rm -f analyze_report.txt
          else
            echo "[RESULT_ANALYZE]"
            echo "❌ config.xml tidak ditemukan."
            echo "[END_RESULT_ANALYZE]"
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: exit 1

      - name: Prepare Android Platform
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "config.xml" ]; then
            echo "📱 Menambahkan platform Android..."
            
            if [ -d "platforms/android" ]; then
              echo "⚠️ Platform Android sudah ada, menghapus..."
              cordova platform remove android
            fi
            
            cordova platform add android
            
            if [ -d "plugins" ]; then
              echo "🔌 Menginstall plugins..."
              cordova prepare
            fi
          else
            echo "❌ config.xml tidak ditemukan!"
            exit 1
          fi

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "config.xml" ]; then
            echo "🏗️ Membangun APK..."
            
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              cordova build android --debug
            else
              echo "🔑 Mem-build release APK..."
              
              if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ] && [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
                echo "✅ Menggunakan signing key dari secrets"
                
                echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > release.keystore
                
                cordova build android --release -- \
                  --keystore=release.keystore \
                  --storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
                  --alias=${{ secrets.ANDROID_KEY_ALIAS }} \
                  --password=${{ secrets.ANDROID_KEY_PASSWORD }}
              else
                echo "⚠️ Tidak ada signing key, build unsigned release"
                cordova build android --release -- --keystore=release.keystore --storePassword=password --alias=alias --password=password 2>/dev/null || \
                cordova build android --release
              fi
            fi
          else
            echo "❌ config.xml tidak ditemukan!"
            exit 1
          fi

      - name: Check APK Output
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE/${{ env.PROJECT_DIR }} -name "*.apk" | head -n 1)
          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          else
            echo "✅ APK ditemukan di: $APK_PATH"
            ls -lh "$APK_FOUND"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cordova-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
